    <style>
        *{box-sizing:border-box;user-select:none}body{margin:0;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;color:#fff;padding:12px}
        .noyau{display:flex;flex-direction:column;align-items:center;margin-top:-20px;margin-bottom:10px}

        .info span{color:#fff}
        .maps{display:flex;gap:12px;width:100%;max-width:700px;margin:15px auto 0}
        .carte{flex:1;background:#2c2e34;border-radius:20px;overflow:hidden;box-shadow:0 4px 12px #0008;border:1px solid #444;height:220px;position:relative}
        .carte h4{margin:0;padding:6px;text-align:center;font-size:.7rem;background:#1f1f2a;color:#ffcd7e}

        .load .spin{width:30px;height:30px;border:3px solid #fff5;border-top-color:#f44;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .btn-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40%;max-width:140px;min-width:100px;aspect-ratio:1;background:#2c2e34;background-size:cover;background-position:center;border-radius:50%;z-index:10;box-shadow:0 8px 20px #0008,inset 0 1px 1px #fff1;cursor:pointer;transition:all .5s}
        .btn-center.pulse{animation:pulse 1.2s infinite}
        @keyframes pulse{0%{box-shadow:0 0 0 0 #f007}70%{box-shadow:0 0 0 15px #f000}100%{box-shadow:0 0 0 0 #f000}}
        .voyant{position:absolute;width:3vmin;height:3vmin;max-width:18px;max-height:18px;min-width:10px;min-height:10px;background:#555;border-radius:50%;transform:translate(-50%,-50%);transition:all .5s,background .2s;box-shadow:0 1px 3px #0008;pointer-events:none;z-index:5}
        .btn-rond{position:absolute;width:9vmin;height:9vmin;max-width:48px;max-height:48px;min-width:36px;min-height:36px;background:#333;background-size:cover;background-position:center;border-radius:50%;cursor:pointer;transform:translate(-50%,-50%);transition:all .5s;border:2px solid #fff6;box-shadow:0 4px 8px #0006;z-index:8;touch-action:manipulation}
        .btn-rond.livre{border:3px solid #39ff14;box-shadow:0 0 12px #39ff14}
        #role-switch{position:fixed;top:8px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:100;padding:0 12px;flex-wrap:wrap}
        .role-btn{padding:6px 14px;border:none;border-radius:40px;font-weight:bold;box-shadow:0 2px 5px #0003;font-size:.8rem;cursor:pointer}
        .active-admin{background:#f44;color:#fff}
        .active-livreur{background:#28a745;color:#fff}
        .brand{background:#1f1f2a;padding:4px 12px;border-radius:40px;font-weight:bold;font-size:.75rem;box-shadow:inset 0 0 2px #fff3,0 2px 6px #000;color:#ffcd7e}
        .admin-bar{position:fixed;top:55px;left:0;right:0;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;z-index:100;pointer-events:none;padding:0 10px}
        .admin-bar select,.admin-bar button{pointer-events:auto;background:#2c2e34;color:#fff;border:1px solid #555;border-radius:30px;padding:4px 12px;font-size:.7rem;font-weight:bold;cursor:pointer;box-shadow:0 2px 6px #000}
        .admin-bar button{background:#4a4e5a}
        .admin-bar label{pointer-events:auto;background:#0008;padding:2px 8px;border-radius:20px;font-size:.7rem;display:inline-flex;align-items:center;gap:5px}
        .admin-bar.hide{display:none}
        .excel-grp{position:relative;display:inline-block}
        .excel-sub{position:absolute;top:100%;left:0;margin-top:5px;background:#2c2e34;border-radius:20px;padding:5px;display:flex;flex-direction:column;gap:5px;z-index:200;box-shadow:0 4px 12px #000}
        .hidden{display:none}
        .offline-msg{position:absolute;bottom:10px;left:10px;background:#000c;color:#fc0;padding:4px 8px;border-radius:8px;font-size:.7rem;z-index:1001;pointer-events:none}
        .geo-msg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#ffcd7e;padding:6px 14px;border-radius:40px;font-size:.75rem;z-index:200;white-space:nowrap;backdrop-filter:blur(4px);text-align:center}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#181818d9;backdrop-filter:blur(3px);z-index:1000;justify-content:center;align-items:center}
        .modal-content{background:#2c2e34;padding:20px 18px;border-radius:40px;width:85%;max-width:300px;text-align:center;box-shadow:12px 12px 24px #0008,-8px -8px 18px #464b554d}
        .modal-content p{font-size:1.3rem;font-weight:600;margin:0 0 16px;color:#fff}
        .modal input{width:100%;margin-bottom:12px;padding:10px 14px;border:none;border-radius:50px;background:#24262c;color:#fff;box-shadow:inset 4px 4px 8px #181a1f,inset -3px -3px 6px #343840}
        .modal button{width:100%;margin-bottom:10px;padding:10px;border-radius:50px;font-weight:bold;background:#343840;color:#fff;box-shadow:5px 5px 10px #1f2127,-3px -3px 6px #40444f;cursor:pointer}
        .modal button:first-of-type{background:#2c7a4d}
        .hist-list{max-height:400px;overflow-y:auto;padding:5px}
        .hist-item{background:#2c2e34;margin:12px 0;padding:12px;border-radius:28px;box-shadow:8px 8px 16px #181a1f,-6px -6px 12px #3a3e48;text-align:left}
        .hist-item .date{font-size:.7rem;color:#ffcd7e;margin-bottom:6px}
        .hist-item .client{font-size:1rem;font-weight:bold;color:#fff}
        .footer{position:fixed;bottom:5px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:.6rem;color:#888;z-index:10;pointer-events:none}
        .reset-btn{pointer-events:auto;background:#4a4e5a;border:none;border-radius:30px;padding:4px 14px;color:#fff;font-size:.7rem;cursor:pointer;box-shadow:0 2px 5px #000}
        .signature{pointer-events:auto;background:#0006;padding:2px 10px;border-radius:20px}
        .reset-msg{position:fixed;bottom:55px;left:50%;transform:translateX(-50%);background:#333;color:#ffcd7e;padding:4px 12px;border-radius:30px;font-size:.65rem;z-index:200;white-space:nowrap}
        .info-img{width:90px;height:90px;background-size:cover;background-position:center;border-radius:30px;margin:0 auto}
    </style>

<body>

</div>
<div class="noyau"><div class="cercles" id="cercles"><div class="btn-center" id="center"></div></div><div class="info" id="info">🎯 <span id="info-nom">—</span> · 📍 <span id="info-dist">—</span> <span id="info-unit">m</span></div></div>
<div class="maps"><div class="carte"><h4>🗺️ Itinéraire détaillé</h4><div id="map" class="leaflet"></div><div id="load1" class="load" style="display:none"><div class="spin"></div></div></div><div class="carte"><h4>🚗 Vue conduite</h4><div id="mini" class="leaflet"></div><div id="load2" class="load" style="display:none"><div class="spin"></div></div></div></div>
<div id="livraison-modal" class="modal"><div class="modal-content"><p>📦 Dépôt produit</p><p style="font-size:.9rem">Avez-vous bien déposé le produit chez <strong id="livraison-client">le client</strong> ?</p><button id="confirm-liv">✅ Confirmer</button><button onclick="closeModal('livraison-modal')">❌ Annuler</button></div></div>

<div id="edit-modal" class="modal"><div class="modal-content"><p>✎ Édition</p><input id="edit-nom" placeholder="Nom"><input id="edit-coords" placeholder="Lat,lon ou Plus Code"><input type="file" id="edit-img" accept="image/*"><button onclick="saveModal()">Valider</button><button onclick="closeModal('edit-modal')">Fermer</button></div></div>
<div id="info-modal" class="modal"><div class="modal-content"><div id="info-img" class="info-img"></div><h2 id="info-nom-modal"></h2><button onclick="closeModal('info-modal')">Fermer</button></div></div>
<div class="footer"><button id="resetBtn" class="reset-btn">🗑️ Reset données</button><div class="signature">Livrezone · Laiche Brahim 2026</div></div>
<script>
// --- Service Worker allégé
if('serviceWorker' in navigator){navigator.serviceWorker.register(URL.createObjectURL(new Blob([`const C='livrezone-v1',U=['/','/index.html','https://unpkg.com/dexie@4.0.1/dist/dexie.js','https://unpkg.com/open-location-code@1.0.3/dist/openlocationcode.min.js','https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js','https://unpkg.com/leaflet@1.9.4/dist/leaflet.css','https://unpkg.com/leaflet@1.9.4/dist/leaflet.js','https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css','https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js'];self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(U))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(n=>n!==C).map(n=>caches.delete(n))))));`],{type:'application/javascript'}))).catch(e=>console.warn(e))}
// --- offline overlay
function updOffline(){document.querySelectorAll('.carte').forEach(c=>{let o=c.querySelector('.offline-msg');if(!navigator.onLine){if(!o){let d=document.createElement('div');d.className='offline-msg';d.textContent='⚠️ Hors-ligne – carte indisponible';c.style.position='relative';c.appendChild(d)}}else if(o)o.remove()})}
window.addEventListener('online',updOffline);window.addEventListener('offline',updOffline);updOffline();
// --- Dexie
const db=new Dexie('LivrezoneDB');db.version(3).stores({points:'id,name,coords,image,delivered',deliveries:'++id,timestamp,pointName'}).upgrade(tx=>tx.table('points').toCollection().modify(p=>{if(p.delivered===undefined)p.delivered=false}));
let role='livreur',active=null,pos=null,unit=10,spectre=100,N=20,CX=50,CY=50,Rv=28,Rb=40,map,mini,routeCtrl=null,routeDest=null,routeLine=null,markerDest=null,lastDrive=0,animId=null,lastPulse=false,resetPending=false,resetTO=null;
const load1=document.getElementById('load1'),load2=document.getElementById('load2'),infoNom=document.getElementById('info-nom'),infoDist=document.getElementById('info-dist'),infoUnit=document.getElementById('info-unit'),centerDiv=document.getElementById('center'),livraisonClient=document.getElementById('livraison-client'),confirmLiv=document.getElementById('confirm-liv'),excelBtn=document.getElementById('excel-btn'),excelSub=document.getElementById('excel-sub'),exportBtn=document.getElementById('export-excel'),importBtn=document.getElementById('import-excel'),excelFile=document.getElementById('excel-file'),geoMsgDiv=document.getElementById('geo-msg'),resetB=document.getElementById('resetBtn'),historyBtn=document.getElementById('history-btn'),unitSel=document.getElementById('unit'),spectreSel=document.getElementById('spectre');
function showLoad(l){if(l)l.style.display='flex'}function hideLoad(l){if(l)l.style.display='none'}
function formatDist(m){if(m<1000){infoUnit.innerText='m';return Math.round(m)}else{infoUnit.innerText='km';return (m/1000).toFixed(1)}}
function parseCoord(s){if(!s)return null;let p=s.split(',').map(v=>parseFloat(v.trim()));if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1]))return{lat:p[0],lng:p[1]};let t=s.trim(),m=/[A-Z0-9]{2,}\+[A-Z0-9]{2,}/i;if(m.test(t))try{let c=t.split(' ')[0];if(OpenLocationCode.isValid(c)){let d=OpenLocationCode.decode(c);if(d&&typeof d.latitudeCenter==='number')return{lat:d.latitudeCenter,lng:d.longitudeCenter}}}catch(e){}return null}
function getDist(lat1,lng1,lat2,lng2){let R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function getColor(d){if(d>spectre)return'#555';if(d<=unit)return'hsl(120,100%,50%)';let t=(d-unit)/(spectre-unit),h=120*(1-t);return`hsl(${Math.max(0,Math.min(120,h))},100%,50%)`}
function updatePulse(){if(!pos){if(lastPulse)centerDiv.classList.remove('pulse');lastPulse=false;return}let minD=Infinity;for(let b of boutons){let c=parseCoord(b.dataset.coords);if(c&&!b.classList.contains('livre')&&pos){let d=getDist(pos.latitude,pos.longitude,c.lat,c.lng);if(d<minD)minD=d}}let pulse=(minD<=10);if(pulse&&!lastPulse){centerDiv.classList.add('pulse');lastPulse=true}else if(!pulse&&lastPulse){centerDiv.classList.remove('pulse');lastPulse=false}}
function updateInfo(){if(!pos){infoNom.innerText='—';infoDist.innerText='—';updatePulse();return}let closest=null,closestD=Infinity;for(let b of boutons){let c=parseCoord(b.dataset.coords);if(c){let d=getDist(pos.latitude,pos.longitude,c.lat,c.lng);if(d<closestD){closestD=d;closest=b}}}if(closest){infoNom.innerText=closest.dataset.name||'Point sans nom';infoDist.innerText=formatDist(closestD)}else{infoNom.innerText='—';infoDist.innerText='—'}updatePulse()}
async function markDelivered(btn){let id=parseInt(btn.dataset.id);btn.dataset.delivered='true';btn.classList.add('livre');let ex=await db.points.get(id);if(ex)await db.points.update(id,{delivered:true});else await db.points.put({id,name:btn.dataset.name||"",coords:btn.dataset.coords||"",image:btn.dataset.image||"",delivered:true})}
async function saveDelivery(name,btn){let now=new Date();await db.deliveries.add({timestamp:now.getTime(),pointName:name,displayDate:now.toLocaleString('fr-FR',{dateStyle:'full',timeStyle:'short'})});await markDelivered(btn)}
async function loadHistory(){let deliveries=await db.deliveries.orderBy('timestamp').reverse().toArray(),cont=document.getElementById('history-list');if(!cont)return;if(!deliveries.length){cont.innerHTML='<div class="hist-item" style="text-align:center">Aucune livraison</div>';return}cont.innerHTML=deliveries.map(d=>`<div class="hist-item"><div class="date">📅 ${d.displayDate||new Date(d.timestamp).toLocaleString()}</div><div class="client">📦 ${escapeHtml(d.pointName)}</div><div class="details">Livraison confirmée</div></div>`).join('')}
function escapeHtml(s){return s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;')}
function openHistory(){loadHistory();document.getElementById('history-modal').style.display='flex'}
confirmLiv.addEventListener('click',async()=>{let closest=null,closestD=Infinity;for(let b of boutons){let c=parseCoord(b.dataset.coords);if(c&&pos&&!b.classList.contains('livre')){let d=getDist(pos.latitude,pos.longitude,c.lat,c.lng);if(d<closestD){closestD=d;closest=b}}}if(closest){let name=closest.dataset.name||'Client inconnu';if(closest.classList.contains('livre')){alert('⚠️ Déjà livré');closeModal('livraison-modal');return}await saveDelivery(name,closest);alert(`✅ Livraison pour ${name}`);closeModal('livraison-modal');if(pos)reorder()}else{alert('❌ Aucun point à proximité');closeModal('livraison-modal')}});
excelBtn.addEventListener('click',e=>{e.stopPropagation();excelSub.classList.toggle('hidden')});document.addEventListener('click',e=>{if(!excelBtn.contains(e.target)&&!excelSub.contains(e.target))excelSub.classList.add('hidden')});
function exportExcel(){let data=[['Nom','Coordonnées']];for(let i=0;i<N;i++){let b=boutons[i];data.push([b.dataset.name||'',b.dataset.coords||''])}let ws=XLSX.utils.aoa_to_sheet(data),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Points');XLSX.writeFile(wb,`livrezone_${new Date().toISOString().slice(0,19)}.xlsx`)}
function importExcel(file){let r=new FileReader();r.onload=e=>{let data=new Uint8Array(e.target.result),wb=XLSX.read(data,{type:'array'}),sheet=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});if(!rows||rows.length<2){alert('Fichier invalide');return}let pts=[];for(let i=1;i<rows.length&&i-1<N;i++){let row=rows[i];pts.push({name:row[0]?String(row[0]).trim():"",coords:row[1]?String(row[1]).trim():""})}while(pts.length<N)pts.push({name:"",coords:""});(async()=>{for(let i=0;i<N;i++){let btn=boutons[i],p=pts[i];btn.dataset.name=p.name;btn.dataset.coords=p.coords;delete btn.dataset.image;delete btn.dataset.delivered;btn.classList.remove('livre');btn.style.backgroundImage='none';btn.style.backgroundColor='#333';await db.points.put({id:i,name:p.name,coords:p.coords,image:"",delivered:false})}refreshAll();alert(`Import terminé : ${pts.filter(p=>p.name||p.coords).length} points`)} )()};r.readAsArrayBuffer(file)}
exportBtn.addEventListener('click',exportExcel);importBtn.addEventListener('click',()=>excelFile.click());excelFile.addEventListener('change',e=>{if(e.target.files.length){importExcel(e.target.files[0]);e.target.value=''}});
function initMaps(){map=L.map('map').setView([48.8566,2.3522],12);L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM & CartoDB',subdomains:'abcd',maxZoom:19}).addTo(map);mini=L.map('mini').setView([48.8566,2.3522],16);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; CartoDB',subdomains:'abcd',maxZoom:19,minZoom:10}).addTo(mini)}
function updateDrivingView(coords){if(!mini||!pos)return;let now=Date.now();if(now-lastDrive<500)return;lastDrive=now;mini.setView([pos.latitude,pos.longitude],16,{animate:false});if(routeLine)mini.removeLayer(routeLine);if(coords&&coords.length)routeLine=L.polyline(coords,{color:'#f44',weight:3,opacity:.9}).addTo(mini);else routeLine=null;let closest=null,minD=Infinity;for(let b of boutons){let c=parseCoord(b.dataset.coords);if(c&&!b.classList.contains('livre')){let d=getDist(pos.latitude,pos.longitude,c.lat,c.lng);if(d<minD){minD=d;closest=c}}}if(closest){if(markerDest)mini.removeLayer(markerDest);markerDest=L.marker([closest.lat,closest.lng],{icon:L.divIcon({html:'🎯',iconSize:[20,20]})}).addTo(mini)}else if(markerDest){mini.removeLayer(markerDest);markerDest=null}}
function updateRoute(){if(!map||!pos)return;let closest=null,minD=Infinity;for(let b of boutons){let c=parseCoord(b.dataset.coords);if(c&&!b.classList.contains('livre')){let d=getDist(pos.latitude,pos.longitude,c.lat,c.lng);if(d<minD){minD=d;closest=c}}}if(closest&&routeDest!==`${closest.lat},${closest.lng}`){routeDest=`${closest.lat},${closest.lng}`;if(routeCtrl)map.removeControl(routeCtrl);showLoad(load1);showLoad(load2);routeCtrl=L.Routing.control({waypoints:[L.latLng(pos.latitude,pos.longitude),L.latLng(closest.lat,closest.lng)],routeWhileDragging:false,showAlternatives:false,lineOptions:{styles:[{color:'#f44',weight:5}]},router:L.Routing.osrmv1({serviceUrl:'https://router.project-osrm.org/route/v1'}),show:false}).addTo(map);routeCtrl.on('routesfound',e=>{hideLoad(load1);hideLoad(load2);let r=e.routes[0];if(r&&r.coordinates&&r.coordinates.length)updateDrivingView(r.coordinates);else updateDrivingView(null)});routeCtrl.on('routingerror',()=>{hideLoad(load1);hideLoad(load2);updateDrivingView(null)})}else if(!closest&&routeCtrl){map.removeControl(routeCtrl);routeCtrl=null;routeDest=null;updateDrivingView(null);hideLoad(load1);hideLoad(load2)}else if(closest&&routeCtrl&&mini&&pos){let now=Date.now();if(now-lastDrive>=500){mini.setView([pos.latitude,pos.longitude],16,{animate:false});let newC=null,newD=Infinity;for(let b of boutons){let c=parseCoord(b.dataset.coords);if(c&&!b.classList.contains('livre')){let d=getDist(pos.latitude,pos.longitude,c.lat,c.lng);if(d<newD){newD=d;newC=c}}}if(newC){if(markerDest)mini.removeLayer(markerDest);markerDest=L.marker([newC.lat,newC.lng],{icon:L.divIcon({html:'🎯',iconSize:[20,20]})}).addTo(mini)}lastDrive=now}}updateInfo()}
function scheduleReorder(){if(animId)return;animId=requestAnimationFrame(()=>{if(pos)reorder();animId=null;updateRoute()})}
function showGeo(m,s){geoMsgDiv.innerHTML=m+(s?' <button id="geo-retry">🔁 Réessayer</button>':'');geoMsgDiv.style.display='block';if(s){let b=document.getElementById('geo-retry');if(b)b.onclick=()=>{initGeo();geoMsgDiv.style.display='none'}}setTimeout(()=>{if(geoMsgDiv.style.display==='block'&&!s){geoMsgDiv.style.opacity='0';setTimeout(()=>geoMsgDiv.style.display='none',1000)}},4000)}
function initGeo(){if(geoWatchId)navigator.geolocation.clearWatch(geoWatchId);showGeo('📍 Demande de position...',false);geoWatchId=navigator.geolocation.watchPosition(p=>{pos=p.coords;geoMsgDiv.style.display='none';scheduleReorder();updateRoute()},err=>{let m="";switch(err.code){case err.PERMISSION_DENIED:m="❌ Accès refusé";break;case err.POSITION_UNAVAILABLE:m="📡 Position indisponible";break;case err.TIMEOUT:m="⏱️ Délai dépassé";break;default:m="⚠️ Erreur GPS"}showGeo(m,true);if(geoWatchId)navigator.geolocation.clearWatch(geoWatchId);geoWatchId=null},{enableHighAccuracy:true,timeout:1e4,maximumAge:0})}
let geoWatchId=null;
const container=document.getElementById('cercles'),voyants=[],boutons=[];
function populateSelects(){for(let v=10;v<=500;v+=10)unitSel.appendChild(new Option(v,v));for(let v=100;v<=5000;v+=100)spectreSel.appendChild(new Option(v,v))}populateSelects();
for(let i=0;i<N;i++){let v=document.createElement('div');v.className='voyant';container.appendChild(v);voyants.push(v);let b=document.createElement('div');b.className='btn-rond';b.dataset.id=i;b.setAttribute('aria-label',`Point ${i+1}`);b.style.backgroundImage='none';b.style.backgroundColor='#333';b.voyant=v;let timer,long=false;b.addEventListener('pointerdown',e=>{e.preventDefault();long=false;timer=setTimeout(()=>{long=true;if(role==='admin')startCapture(b)},800)});b.addEventListener('pointerup',e=>{e.preventDefault();clearTimeout(timer);if(!long&&role==='admin')openEdit(b);else if(!long&&role!=='admin')openInfo(b)});b.addEventListener('pointercancel',()=>clearTimeout(timer));container.appendChild(b);boutons.push(b)}
function updateAria(){boutons.forEach((b,i)=>{b.setAttribute('aria-label',`Point ${i+1} – ${b.dataset.name||'sans nom'} – ${role==='admin'?'éditer':'voir'}`)})}
function position(b,a){let l=CX+Rb*Math.cos(a),t=CY+Rb*Math.sin(a);b.style.left=`${l}%`;b.style.top=`${t}%`;if(b.voyant){let vl=CX+Rv*Math.cos(a),vt=CY+Rv*Math.sin(a);b.voyant.style.left=`${vl}%`;b.voyant.style.top=`${vt}%`}}
function reorder(){if(!pos)return;let withD=boutons.map(b=>{let d=Infinity,c=parseCoord(b.dataset.coords);if(c)d=getDist(pos.latitude,pos.longitude,c.lat,c.lng);return{btn:b,dist:d}});let nonLiv=withD.filter(x=>!x.btn.classList.contains('livre')),liv=withD.filter(x=>x.btn.classList.contains('livre'));let sorted=[...nonLiv.sort((a,b)=>a.dist-b.dist),...liv];sorted.forEach((x,i)=>{let a=(i/N)*2*Math.PI-Math.PI/2;position(x.btn,a)});nonLiv.forEach(x=>{let d=x.dist;if(d===Infinity)x.btn.voyant.style.backgroundColor='#555';else x.btn.voyant.style.backgroundColor=getColor(d)});liv.forEach(x=>x.btn.voyant.style.backgroundColor='#555');let closest=nonLiv[0]?.btn;if(closest&&closest.dataset.image){centerDiv.style.backgroundImage=`url(${closest.dataset.image})`;centerDiv.style.backgroundColor='transparent'}else{centerDiv.style.backgroundImage='none';centerDiv.style.backgroundColor='#2c2e34'}updateInfo()}
async function loadAll(){let pts=await db.points.toArray();for(let p of pts){let b=boutons[p.id];if(b){b.dataset.name=p.name||"";b.dataset.coords=p.coords||"";b.dataset.image=p.image||"";if(b.dataset.image)b.style.backgroundImage=`url(${b.dataset.image})`;else b.style.backgroundImage='none';if(p.delivered){b.dataset.delivered='true';b.classList.add('livre')}else b.classList.remove('livre');updateAria()}}refreshAll()}
async function savePoint(id,name,coords,img,del=false){await db.points.put({id,name,coords,image:img,delivered:del})}
async function deleteAll(){await db.points.clear();await db.deliveries.clear()}
async function getPoint(id){return await db.points.get(id)}
function refreshAll(){boutons.forEach(b=>{if(b.dataset.image&&b.dataset.image!==""){b.style.backgroundImage=`url(${b.dataset.image})`;b.style.backgroundColor='transparent'}else{b.style.backgroundImage='none';b.style.backgroundColor='#333'}if(b.dataset.delivered==='true')b.classList.add('livre');else b.classList.remove('livre');updateAria()});if(pos)reorder();else boutons.forEach((b,i)=>{let a=(i/N)*2*Math.PI-Math.PI/2;position(b,a);if(b.voyant)b.voyant.style.backgroundColor='#555'})}
async function resetAll(){await deleteAll();boutons.forEach(b=>{delete b.dataset.name;delete b.dataset.coords;delete b.dataset.image;delete b.dataset.delivered;b.classList.remove('livre');b.style.backgroundImage='none';b.style.backgroundColor='#333';if(b.voyant)b.voyant.style.backgroundColor='#555'});centerDiv.style.backgroundImage='none';centerDiv.style.backgroundColor='#2c2e34';if(pos)scheduleReorder();showResetMsg('✓ Données effacées');if(routeCtrl)map.removeControl(routeCtrl);routeCtrl=null;routeDest=null;if(routeLine)mini.removeLayer(routeLine);if(markerDest)mini.removeLayer(markerDest);routeLine=null;markerDest=null;hideLoad(load1);hideLoad(load2);updateInfo()}
function showResetMsg(m){let d=document.querySelector('.reset-msg');if(!d){d=document.createElement('div');d.className='reset-msg';document.body.appendChild(d)}d.textContent=m;d.style.opacity='1';clearTimeout(window.rmt);window.rmt=setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),500)},2000)}
resetB.addEventListener('click',e=>{e.stopPropagation();if(resetPending){clearTimeout(resetTO);resetAll();resetPending=false;resetB.textContent='🗑️ Reset données';resetB.style.background='#4a4e5a'}else{resetPending=true;resetB.textContent='⚠️ Confirmer ?';resetB.style.background='#c0392b';resetTO=setTimeout(()=>{resetPending=false;resetB.textContent='🗑️ Reset données';resetB.style.background='#4a4e5a';showResetMsg('Annulé')},2500);showResetMsg('Cliquez à nouveau pour confirmer')}})
function toggleRole(){role=(role==='livreur')?'admin':'livreur';let b=document.getElementById('mode-btn');b.innerText=`Mode : ${role.toUpperCase()}`;b.className=`role-btn ${role==='admin'?'active-admin':'active-livreur'}`;let bar=document.getElementById('admin-bar');if(role==='admin')bar.classList.remove('hide');else bar.classList.add('hide');updateAria()}
function openEdit(b){active=b;document.getElementById('edit-coords').value=b.dataset.coords||"";document.getElementById('edit-nom').value=b.dataset.name||"";document.getElementById('edit-modal').style.display='flex'}
function openInfo(b){active=b;document.getElementById('info-nom-modal').innerText=b.dataset.name||"Point sans nom";let img=document.getElementById('info-img');img.style.backgroundImage=b.dataset.image?`url(${b.dataset.image})`:'none';document.getElementById('info-modal').style.display='flex'}
function closeModal(id){document.getElementById(id).style.display='none'}
async function saveModal(){if(!active)return;let id=parseInt(active.dataset.id),name=document.getElementById('edit-nom').value,coords=document.getElementById('edit-coords').value,file=document.getElementById('edit-img').files[0],ex=await getPoint(id),wasDel=ex?ex.delivered:false;if(file){let r=new FileReader();r.onload=async e=>{let img=new Image();img.onload=async()=>{let c=document.createElement('canvas');c.width=c.height=200;c.getContext('2d').drawImage(img,0,0,200,200);let data=c.toDataURL('image/jpeg',0.9);active.dataset.name=name;active.dataset.coords=coords;active.dataset.image=data;if(wasDel)active.dataset.delivered='true';else delete active.dataset.delivered;await savePoint(id,name,coords,data,wasDel);refreshAll()};img.src=e.target.result};r.readAsDataURL(file)}else{active.dataset.name=name;active.dataset.coords=coords;let imgData=ex?ex.image:(active.dataset.image||"");active.dataset.image=imgData;if(wasDel)active.dataset.delivered='true';else delete active.dataset.delivered;await savePoint(id,name,coords,imgData,wasDel);refreshAll()}closeModal('edit-modal')}
function startCapture(b){navigator.geolocation.getCurrentPosition(p=>{if(navigator.vibrate)navigator.vibrate(200);openEdit(b);document.getElementById('edit-coords').value=`${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`},err=>showGeo("❌ Impossible d'obtenir la position",true))}
function loadSettings(){let u=localStorage.getItem('livrezone_unit'),s=localStorage.getItem('livrezone_spectre');if(u)unit=parseInt(u);if(s)spectre=parseInt(s);unitSel.value=unit;spectreSel.value=spectre}
function saveSettings(){localStorage.setItem('livrezone_unit',unit);localStorage.setItem('livrezone_spectre',spectre)}
function onSettingChange(){unit=parseInt(unitSel.value);spectre=parseInt(spectreSel.value);saveSettings();if(pos)scheduleReorder()}
unitSel.addEventListener('change',onSettingChange);spectreSel.addEventListener('change',onSettingChange);historyBtn.addEventListener('click',openHistory);
centerDiv.addEventListener('click',e=>{e.stopPropagation();if(role==='livreur'){let has=false;for(let b of boutons){if(!b.classList.contains('livre')&&parseCoord(b.dataset.coords)){has=true;break}}if(!has){alert('🎉 Tous les points ont été livrés !');return}let closest=null,minD=Infinity;for(let b of boutons){if(!b.classList.contains('livre')){let c=parseCoord(b.dataset.coords);if(c&&pos){let d=getDist(pos.latitude,pos.longitude,c.lat,c.lng);if(d<minD){minD=d;closest=b}}}}if(closest){livraisonClient.innerText=closest.dataset.name||"le client";document.getElementById('livraison-modal').style.display='flex'}else alert('Aucun point à livrer à proximité')}});
loadSettings();initMaps();loadAll().then(()=>initGeo());if(role==='admin')document.getElementById('admin-bar').classList.remove('hide');updateAria();
</script>
